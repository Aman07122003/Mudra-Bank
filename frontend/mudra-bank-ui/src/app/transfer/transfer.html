<div class="modal-backdrop">

  <div class="modal">

    <div class="modal-header">
      <h2>
        {{ type === 'DEBIT' ? 'Debit Account' : 'Credit Account' }}
      </h2>
    </div>

    <div class="account-card">
      <div class="account-info">
        <span class="label">Account Number</span>
        <span class="value">{{ account.accountNumber }}</span>
      </div>

      <div class="account-info">
        <span class="label">Balance</span>
        <span class="balance">₹ {{ account.balance }}</span>
      </div>
    </div>

    <div class="form-group">

      <label>
        {{ type === 'DEBIT'
            ? 'Source Account'
            : 'Destination Account' }}
      </label>

      <input
          type="number"
          [value]="account.accountNumber"
          readonly>

    </div>

    <div class="form-group">

      <label>
        {{ type === 'DEBIT'
            ? 'Target Account'
            : 'Source Account' }}
      </label>

      <input
          type="number"
          [(ngModel)]="otherAccountNumber">

    </div>

    <div class="form-group">

      <label>Amount</label>

      <input
          type="number"
          [(ngModel)]="amount"
          placeholder="Enter amount">

    </div>

    <div class="actions">

      <button
        class="cancel-btn"
        (click)="cancel()">
        Cancel
      </button>

      <button
        class="submit-btn"
        (click)="submit()"
        [disabled]="isSubmitting">

        {{ isSubmitting ? 'Submitting...' : 'Submit' }}

      </button>

    </div>

  </div>

</div>
